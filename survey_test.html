<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Survey QA Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F3F8;padding:16px}
h1{font-size:18px;font-weight:700;color:#1B2B5E;margin-bottom:4px}
.sub{font-size:13px;color:#6B7A99;margin-bottom:20px}
.sec{background:white;border-radius:12px;border:1px solid #DDE4EF;margin-bottom:16px;overflow:hidden}
.sec-h{background:#EEF2F8;padding:10px 16px;font-size:13px;font-weight:700;color:#1B2B5E;border-bottom:1px solid #DDE4EF}
.item{padding:10px 16px;border-bottom:1px solid #F0F3F8;display:flex;align-items:flex-start;gap:10px;font-size:13px}
.item:last-child{border-bottom:none}
.dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
.p{background:#dcfce7;color:#16A34A}.f{background:#fee2e2;color:#DC2626}
.w{background:#FFF3CD;color:#92400e}.m{background:#EEF2F8;color:#1B2B5E}
.txt{flex:1;line-height:1.45;color:#1A2340}
.d{font-size:11px;color:#6B7A99;margin-top:2px}
.e{font-size:11px;color:#DC2626;margin-top:2px;font-family:monospace;word-break:break-all}
.sum{background:#1B2B5E;color:white;border-radius:12px;padding:16px;margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap}
.si{text-align:center}.sn{font-size:28px;font-weight:700;display:block}
.sp{color:#86efac}.sf{color:#fca5a5}.sm{color:#93c5fd}
.note{font-size:12px;color:#6B7A99;padding:8px 16px;background:#FAFBFC;border-top:1px solid #DDE4EF;font-style:italic}
.btn{background:#1B2B5E;color:white;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px}
.dev{font-size:11px;color:#6B7A99;background:white;border-radius:8px;padding:8px 12px;margin-bottom:16px;border:1px solid #DDE4EF}
</style>
</head><body>
<h1>Survey QA Checklist</h1>
<p class="sub">Automated + manual tests. Open on both desktop and mobile.</p>
<div class="dev" id="dev">Loading...</div>
<button class="btn" onclick="runAll()">&#8635; Re-run</button>
<div class="sum" id="sum">Running...</div>
<div id="res"></div>
<div class="sec">
  <div class="sec-h">9. Content integrity (auto)</div>
  <div id="cr"><div class="item"><div class="dot m">&#8594;</div><div class="txt">Waiting for React CDN...</div></div></div>
</div>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script>

var TP=0,TF=0,TM=0;
function itm(c,i,t,d,e){return '<div class="item"><div class="dot '+c+'">'+i+'</div><div class="txt">'+t+(d?'<div class="d">'+d+'</div>':'')+(e?'<div class="e">'+e+'</div>':'')+'</div></div>';}
function at(ok,t,d,e){if(ok)TP++;else TF++;return itm(ok?'p':'f',ok?'&#10003;':'&#10007;',t,d,ok?null:e);}
function mn(t,d){TM++;return itm('m','?',t,d,null);}
function sc(title,body,note){return '<div class="sec"><div class="sec-h">'+title+'</div>'+body+(note?'<div class="note">'+note+'</div>':'')+'</div>';}
function upd(){document.getElementById('sum').innerHTML='<div class="si"><span class="sn sp">'+TP+'</span><span>Auto-pass</span></div><div class="si"><span class="sn sf">'+TF+'</span><span>Auto-fail</span></div><div class="si"><span class="sn sm">'+TM+'</span><span>Manual</span></div><div class="si"><span class="sn" style="color:white">'+(TP+TF+TM)+'</span><span>Total</span></div>';}

function runAll(){
  TP=0;TF=0;TM=0;var h='',mob=window.innerWidth<768;
  document.getElementById('dev').innerHTML='<b>'+(mob?'Mobile':'Desktop')+'</b> | '+window.innerWidth+'px | '+navigator.userAgent.slice(0,80)+'... | Online: '+navigator.onLine;
  var s='';
  s+=at(typeof React!=='undefined','React loaded',typeof React!=='undefined'?'v'+React.version:null,'React CDN failed');
  s+=at(typeof ReactDOM!=='undefined','ReactDOM loaded',null,'ReactDOM CDN failed');
  var ls=false;try{localStorage.setItem('_q','1');ls=localStorage.getItem('_q')==='1';localStorage.removeItem('_q');}catch(x){}
  s+=at(ls,'localStorage works',null,'Blocked (private mode?)');
  s+=at(typeof fetch!=='undefined','fetch API available',null,'fetch not available');
  s+=at(window.innerWidth>0,'Window dimensions valid',window.innerWidth+'x'+window.innerHeight);
  h+=sc('1. Environment',s);
  s='';
  s+=mn('Consent screen loads on first visit','Open in fresh/incognito tab');
  s+=mn('EN/KO toggle switches all text on consent');
  s+=mn('Agree checkbox enables Continue button','Disabled until checked');
  s+=mn('Continue goes to Instructions and scrolls to top');
  s+=mn('Begin Survey shows vignette modal (mobile) or Part A (desktop)');
  s+=mn('"Back to Instructions" visible on Case 1 Rubric 1 vignette only');
  s+=mn('"Got it" button at BOTTOM of vignette - must scroll to reach');
  h+=sc('2. Navigation',s,'Open survey in another tab');
  s='';
  s+=mn('Agree/Disagree buttons highlight green/red');
  s+=mn('Comment textarea appears only after Agree/Disagree selected');
  s+=mn('Keyboard stays open while typing comment');
  s+=mn('Comment saved after tapping away - persists on back-nav');
  s+=mn('All answers preserved when going Back from Part B');
  s+=mn('Changing one answer does NOT wipe other answers');
  s+=mn('"Continue to Part B" disabled until all items answered');
  s+=mn('Tapping Continue early highlights first unanswered item in amber');
  h+=sc('3. Part A',s,'Test on Case 1 Rubric 1');
  s='';
  s+=mn('Two domain sections with items to rank');
  s+=mn('Drag handle (grip dots) visible on left of each item');
  s+=mn('Dragging handle reorders items');
  s+=mn('Touching item text body scrolls page - does NOT reorder');
  s+=mn('Arrow buttons reorder items');
  s+=mn('First up-arrow and last down-arrow greyed out');
  s+=mn('Ranking preserved when navigating away and back');
  s+=mn('Button label: Next Rubric / Next Case / Finish Survey as appropriate');
  h+=sc('4. Part B',s);
  s='';
  s+=mn('Survey loads on mobile Safari (no blank page)');
  s+=mn('"View Case" button visible in Part A / Part B');
  s+=mn('"View Case" NOT visible on consent or instructions');
  s+=mn('Vignette modal title wraps fully - not truncated');
  s+=mn('Toggle in modal says "&#54620;&#44397;&#50612;" not "&#54620;"');
  s+=mn('"Got it" closes modal and returns to survey');
  s+=mn('Page scrolls normally - item body touch does not reorder');
  h+=sc('5. Mobile',s,'Test on iPhone/Android');
  s='';
  s+=mn('Sticky sidebar visible on left in Part A/B');
  s+=mn('Full survey title in header - wraps, not cut off');
  s+=mn('Progress bar advances per rubric completed');
  s+=mn('Breadcrumb shows Case X of 5 / Rubric Y of 4');
  h+=sc('6. Desktop',s);
  s='';
  s+=mn('Refresh mid-survey restores position and answers');
  s+=mn('All 20 rubrics completable (5 cases x 4 rubrics)');
  s+=mn('"Finish Survey" only on Case 5 Rubric 4');
  s+=mn('Done screen appears after all rubrics complete');
  s+=mn('Submit sends data to Supabase - check dashboard');
  s+=mn('Download backup JSON works on Done screen');
  h+=sc('7. Submission',s,'Check Supabase after submitting');
  document.getElementById('res').innerHTML=h;
  upd();
  runContentCheck();
}
runAll();

function runContentCheck(){
  var SCOPEN='<'+'script>';
  var SCCLOSE='<'+'/'+'script>';
  var url=window.location.href.replace('survey_test.html','index.html');
  document.getElementById('cr').innerHTML='<div class="item"><div class="dot m">&#8594;</div><div class="txt">Running content checks...</div></div>';
  fetch(url).then(function(r){return r.text();}).then(function(html){
    var out='',cp=0,cf=0;
    function c(ok,t,d,e){if(ok){cp++;TP++;}else{cf++;TF++;}out+=itm(ok?'p':'f',ok?'&#10003;':'&#10007;',t,d,ok?null:e);}
    var s1=html.indexOf(SCOPEN+'\n'),s2=html.lastIndexOf(SCCLOSE);
    if(s1<0||s2<0){c(false,'Could not extract script from index.html',null,'Check file structure');}
    else{
      var scr=html.slice(s1+8,s2);
      try{
        var fn=new Function('React','ReactDOM',scr+'\nreturn typeof CASES!=="undefined"?CASES:null;');
        var CS=fn(window.React,window.ReactDOM);
        c(!!CS,'CASES data loaded',null,'CASES undefined after eval');
        if(CS){
          c(CS.length===5,'5 cases found','Found: '+CS.length,'Expected 5');
          var tR=0,kEn=0,mF=0,dups={},ptErr=[];
          CS.forEach(function(ca){
            c(ca.rubrics&&ca.rubrics.length===4,'Case '+ca.id+': 4 rubrics',ca.en?ca.en.slice(0,55):null,'Found '+(ca.rubrics?ca.rubrics.length:0));
            c(!!(ca.vignette&&ca.vignette.rows&&ca.vignette.rows.length),'Case '+ca.id+': vignette present',null,'Missing vignette');
            (ca.rubrics||[]).forEach(function(r){
              tR++;
              var ps=(r.d1pts||0)+(r.d2pts||0);
              if(ps!==100)ptErr.push('Rubric '+r.id+': '+ps);
              (r.d1||[]).concat(r.d2||[]).forEach(function(it){
                dups[it.id]=(dups[it.id]||0)+1;
                ['en','ko','xEn','xKo','pts'].forEach(function(f){if(!it[f])mF++;});
                if(/[\uAC00-\uD7A3]/.test(it.en||'')||/[\uAC00-\uD7A3]/.test(it.xEn||''))kEn++;
              });
            });
          });
          c(tR===20,'20 total rubrics',tR+' found','Expected 20');
          c(ptErr.length===0,'All rubrics: d1pts+d2pts=100',null,ptErr.join('; '));
          c(kEn===0,'No Korean in EN fields',null,kEn+' items have Korean in EN fields');
          c(mF===0,'All items have required fields',null,mF+' missing');
          var dp=Object.keys(dups).filter(function(k){return dups[k]>1;});
          c(dp.length===0,'No duplicate item IDs',null,'Dupes: '+dp.join(', '));
        }
      }catch(e){c(false,'Script eval',null,e.message);}
    }
    out+='<div class="note">Content: '+cp+' passed, '+cf+' failed</div>';
    document.getElementById('cr').innerHTML=out;
    upd();
  }).catch(function(e){
    document.getElementById('cr').innerHTML=itm('w','!','Could not load index.html: '+e.message,'Make sure both files are on the same GitHub Pages domain',null);
  });
}
runContentCheck();

</script>
</body></html>

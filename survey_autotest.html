<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Survey Automated Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F3F8;padding:16px}
h1{font-size:18px;font-weight:700;color:#1B2B5E;margin-bottom:4px}
.sub{font-size:13px;color:#6B7A99;margin-bottom:16px}
.controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.btn{background:#1B2B5E;color:white;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer}
.btn:disabled{background:#B0BAD0;cursor:not-allowed}
.btn.sec{background:white;color:#1B2B5E;border:2px solid #1B2B5E}
.sum{background:#1B2B5E;color:white;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.si{text-align:center}.sn{font-size:24px;font-weight:700;display:block}
.sp{color:#86efac}.sf{color:#fca5a5}.sr{color:#93c5fd}
.log{background:white;border-radius:12px;border:1px solid #DDE4EF;margin-bottom:16px;max-height:400px;overflow-y:auto}
.log-h{background:#EEF2F8;padding:10px 16px;font-size:13px;font-weight:700;color:#1B2B5E;border-bottom:1px solid #DDE4EF;position:sticky;top:0}
.li{padding:8px 16px;border-bottom:1px solid #F0F3F8;font-size:12px;display:flex;gap:8px;align-items:flex-start}
.li:last-child{border-bottom:none}
.tag{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.tp{background:#dcfce7;color:#16A34A}
.tf{background:#fee2e2;color:#DC2626}
.ti{background:#EEF2F8;color:#1B2B5E}
.tw{background:#FFF3CD;color:#92400e}
.prog{background:white;border-radius:12px;border:1px solid #DDE4EF;padding:14px 16px;margin-bottom:16px}
.prog-bar{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:#1B2B5E;border-radius:99px;transition:width 0.3s}
.prog-txt{font-size:12px;color:#6B7A99;margin-top:4px}
iframe{display:none}
</style>
</head><body>
<h1>Survey Automated Test</h1>
<p class="sub">Simulates a complete survey run — all 20 rubrics — and verifies Supabase submission.</p>

<div class="controls">
  <button class="btn" id="btnRun" onclick="startTest()">&#9654; Run Full Test</button>
  <button class="btn sec" id="btnStop" onclick="stopTest()" disabled>&#9632; Stop</button>
</div>

<div class="sum" id="sum">
  <div class="si"><span class="sn sp" id="sPass">0</span><span>Pass</span></div>
  <div class="si"><span class="sn sf" id="sFail">0</span><span>Fail</span></div>
  <div class="si"><span class="sn sr" id="sRun">—</span><span>Status</span></div>
</div>

<div class="prog" id="progBox" style="display:none">
  <div style="font-size:13px;font-weight:600;color:#1B2B5E" id="progLabel">Starting...</div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-txt" id="progTxt"></div>
</div>

<div class="log">
  <div class="log-h">Test log</div>
  <div id="logBody"><div class="li"><span class="tag ti">INFO</span><span>Click "Run Full Test" to start</span></div></div>
</div>

<iframe id="frame" src=""></iframe>

var SUPABASE_URL = 'https://qydinydhytepqptcvslb.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5ZGlueWRoeXRlcHFwdGN2c2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk0NTUsImV4cCI6MjA5MDQwNTQ1NX0.ZniqFMfctWHgbA4dJSlrvlFxWRcRfCrVuA9S3gjcA5o';
var SURVEY_URL = window.location.href.replace('survey_autotest.html','index.html');

var pass=0, fail=0, stopped=false, testPid=null;

function log(type, msg) {
  var tags = {pass:'tp',fail:'tf',info:'ti',warn:'tw'};
  var labels = {pass:'PASS',fail:'FAIL',info:'INFO',warn:'WARN'};
  var lb = document.getElementById('logBody');
  var div = document.createElement('div');
  div.className='li';
  div.innerHTML='<span class="tag '+tags[type]+'">'+labels[type]+'</span><span>'+msg+'</span>';
  lb.appendChild(div);
  lb.scrollTop = lb.scrollHeight;
  if(type==='pass') { pass++; document.getElementById('sPass').textContent=pass; }
  if(type==='fail') { fail++; document.getElementById('sFail').textContent=fail; }
}

function setStatus(s) { document.getElementById('sRun').textContent=s; }

function setProgress(done, total, label) {
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = label;
  document.getElementById('progTxt').textContent = done+' / '+total+' rubrics ('+pct+'%)';
}

function wait(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

function getFrame() { return document.getElementById('frame'); }
function getDoc() { return getFrame().contentDocument || getFrame().contentWindow.document; }
function getWin() { return getFrame().contentWindow; }

function $(sel, ctx) { return (ctx||getDoc()).querySelector(sel); }
function $$(sel, ctx) { return Array.from((ctx||getDoc()).querySelectorAll(sel)); }

function clickBtn(text, doc) {
  var d = doc || getDoc();
  var btns = Array.from(d.querySelectorAll('button'));
  var btn = btns.find(function(b){ return b.textContent.trim().indexOf(text) >= 0 && !b.disabled; });
  if(btn) { btn.click(); return true; }
  return false;
}

function stopTest() {
  stopped = true;
  setStatus('Stopped');
  document.getElementById('btnRun').disabled=false;
  document.getElementById('btnStop').disabled=true;
}

async function startTest() {
  pass=0; fail=0; stopped=false;
  document.getElementById('sPass').textContent='0';
  document.getElementById('sFail').textContent='0';
  document.getElementById('logBody').innerHTML='';
  document.getElementById('btnRun').disabled=true;
  document.getElementById('btnStop').disabled=false;
  document.getElementById('progBox').style.display='block';

  try {
    await runTest();
  } catch(e) {
    log('fail', 'Test crashed: '+e.message);
    setStatus('Error');
  }
  document.getElementById('btnRun').disabled=false;
  document.getElementById('btnStop').disabled=true;
}

async function waitFor(checkFn, timeout, desc) {
  var start = Date.now();
  while(Date.now()-start < timeout) {
    if(stopped) throw new Error('Stopped');
    try { if(checkFn()) return true; } catch(e){}
    await wait(100);
  }
  log('fail', 'Timeout waiting for: '+desc);
  return false;
}

async function runTest() {
  setStatus('Loading...');
  log('info', 'Loading survey: '+SURVEY_URL);

  // Clear localStorage to start fresh
  try {
    var fr = getFrame();
    fr.src = SURVEY_URL;
    await wait(500);
    // Clear any saved state
    if(getWin().localStorage) getWin().localStorage.clear();
    fr.src = SURVEY_URL;
  } catch(e) {}

  // Wait for React to mount
  var loaded = await waitFor(function(){
    var doc = getDoc();
    return doc && doc.body && doc.body.innerHTML.length > 500;
  }, 10000, 'survey to load');
  if(!loaded) return;

  await wait(1500); // let React render
  log('pass', 'Survey loaded in iframe');

  // ── CONSENT SCREEN ────────────────────────────────────────────────────────
  setStatus('Consent...');
  log('info', '── Consent screen ──');

  var consentOk = await waitFor(function(){
    return $$('button').some(function(b){ return b.textContent.indexOf('Continue') >= 0; });
  }, 5000, 'consent screen');

  if(!consentOk) { log('fail','Consent screen did not load'); return; }
  log('pass','Consent screen rendered');

  // Find and check the agree checkbox
  var checkbox = $('input[type="checkbox"]');
  if(!checkbox) { log('fail','Consent checkbox not found'); return; }
  log('pass','Consent checkbox found');

  // Continue button should be disabled
  var contBtn = $$('button').find(function(b){ return b.textContent.indexOf('Continue') >= 0; });
  if(contBtn && contBtn.disabled) log('pass','Continue disabled before checkbox');
  else log('warn','Continue button state unclear before checkbox');

  checkbox.click();
  await wait(200);

  contBtn = $$('button').find(function(b){ return b.textContent.indexOf('Continue') >= 0; });
  if(contBtn && !contBtn.disabled) log('pass','Continue enabled after checkbox');
  else log('fail','Continue still disabled after checkbox');

  contBtn.click();
  await wait(800);

  // ── INSTRUCTIONS ──────────────────────────────────────────────────────────
  setStatus('Instructions...');
  log('info','── Instructions screen ──');

  var instrOk = await waitFor(function(){
    return $$('button').some(function(b){ return b.textContent.indexOf('Begin') >= 0 || b.textContent.indexOf('시작') >= 0; });
  }, 5000, 'instructions screen');

  if(!instrOk) { log('fail','Instructions screen did not load'); return; }
  log('pass','Instructions screen rendered');

  clickBtn('Begin');
  await wait(800);

  // ── LOOP THROUGH ALL 20 RUBRICS ───────────────────────────────────────────
  log('info','── Starting rubric loop ('+RUBRICS.length+' rubrics) ──');

  for(var ri=0; ri<RUBRICS.length; ri++) {
    if(stopped) return;
    var rub = RUBRICS[ri];
    setProgress(ri, RUBRICS.length, 'Rubric '+rub.id);
    log('info','Rubric '+rub.id+' ('+rub.items.length+' items)');

    // ── VIGNETTE MODAL (mobile / first of each case) ─────────────────────
    await wait(600);
    // Close vignette modal if open (click Got it)
    var gotIt = $$('button').find(function(b){
      return b.textContent.indexOf('Got it') >= 0 || b.textContent.indexOf('확인') >= 0;
    });
    if(gotIt) {
      gotIt.click();
      log('pass','Rubric '+rub.id+': vignette modal closed');
      await wait(400);
    }

    // ── PART A ───────────────────────────────────────────────────────────
    var partAOk = await waitFor(function(){
      return $$('button').some(function(b){
        return b.textContent.indexOf('Agree') >= 0 || b.textContent.indexOf('동의') >= 0;
      });
    }, 5000, 'Part A for rubric '+rub.id);

    if(!partAOk) { log('fail','Rubric '+rub.id+': Part A did not render'); continue; }
    log('pass','Rubric '+rub.id+': Part A rendered');

    // Click Agree on all items
    var maxAttempts = rub.items.length + 5;
    var attempts = 0;
    while(attempts < maxAttempts) {
      if(stopped) return;
      attempts++;
      // Find all Agree buttons that aren't selected yet
      var agreeBtns = $$('button').filter(function(b){
        return (b.textContent.trim() === '✓ Agree' || b.textContent.trim() === '✓ 동의') &&
               b.style.border && b.style.border.indexOf('rgb(22') < 0; // not green
      });
      if(agreeBtns.length === 0) break;
      agreeBtns[0].click();
      await wait(80);
    }

    // Check continue button is now enabled
    var contB = $$('button').find(function(b){
      return b.textContent.indexOf('Continue to Part B') >= 0 || b.textContent.indexOf('파트 B') >= 0;
    });
    if(contB && !contB.disabled) log('pass','Rubric '+rub.id+': Part A all answered, Continue enabled');
    else log('fail','Rubric '+rub.id+': Continue to Part B still disabled after answering all');

    if(contB) contB.click();
    await wait(600);

    // ── PART B ───────────────────────────────────────────────────────────
    var partBOk = await waitFor(function(){
      return $$('button').some(function(b){
        return b.textContent.indexOf('Next') >= 0 || b.textContent.indexOf('Finish') >= 0 ||
               b.textContent.indexOf('다음') >= 0 || b.textContent.indexOf('완료') >= 0;
      });
    }, 5000, 'Part B for rubric '+rub.id);

    if(!partBOk) { log('fail','Rubric '+rub.id+': Part B did not render'); continue; }
    log('pass','Rubric '+rub.id+': Part B rendered');

    // Check drag handles exist
    var handles = $$('div').filter(function(d){ return d.textContent.trim() === '⠿'; });
    if(handles.length > 0) log('pass','Rubric '+rub.id+': drag handles present ('+handles.length+')');
    else log('warn','Rubric '+rub.id+': no drag handles found');

    // Check arrow buttons exist
    var arrows = $$('button').filter(function(b){ return b.textContent.trim()==='▲'||b.textContent.trim()==='▼'; });
    if(arrows.length > 0) log('pass','Rubric '+rub.id+': arrow buttons present ('+arrows.length+')');
    else log('warn','Rubric '+rub.id+': no arrow buttons found');

    // Check next button label is correct
    var isLast = ri === RUBRICS.length - 1;
    var nextBtn = $$('button').find(function(b){
      var t = b.textContent;
      return t.indexOf('Next') >= 0 || t.indexOf('Finish') >= 0 || t.indexOf('다음') >= 0 || t.indexOf('완료') >= 0;
    });
    if(nextBtn) {
      if(isLast) {
        if(nextBtn.textContent.indexOf('Finish') >= 0 || nextBtn.textContent.indexOf('완료') >= 0)
          log('pass','Last rubric shows "Finish Survey"');
        else
          log('fail','Last rubric should show "Finish Survey", got: '+nextBtn.textContent.trim());
      }
      nextBtn.click();
    } else {
      log('fail','Rubric '+rub.id+': no Next/Finish button found');
    }
    await wait(400);
  }

  setProgress(RUBRICS.length, RUBRICS.length, 'All rubrics done');

  // ── DONE SCREEN ───────────────────────────────────────────────────────────
  setStatus('Done screen...');
  log('info','── Done screen ──');

  var doneOk = await waitFor(function(){
    return $$('button').some(function(b){
      return b.textContent.indexOf('Submit') >= 0 || b.textContent.indexOf('제출') >= 0;
    });
  }, 5000, 'Done screen');

  if(!doneOk) { log('fail','Done screen did not load'); setStatus('Failed'); return; }
  log('pass','Done screen rendered');

  // Get the participant ID for verification
  testPid = null;
  var allText = getDoc().body.innerText || '';
  var pidMatch = allText.match(/P-[A-Z0-9]{6}/);
  if(pidMatch) { testPid = pidMatch[0]; log('pass','Participant ID: '+testPid); }

  // Click Submit
  var submitBtn = $$('button').find(function(b){
    return b.textContent.indexOf('Submit') >= 0 || b.textContent.indexOf('제출') >= 0;
  });
  if(!submitBtn) { log('fail','Submit button not found'); setStatus('Failed'); return; }

  log('info','Clicking Submit...');
  submitBtn.click();

  // Wait for success
  var submitted = await waitFor(function(){
    var txt = getDoc().body.innerText || '';
    return txt.indexOf('submitted') >= 0 || txt.indexOf('제출 완료') >= 0 || txt.indexOf('thank you') >= 0 || txt.indexOf('감사합니다') >= 0;
  }, 15000, 'submission success');

  if(submitted) {
    log('pass','Survey submitted successfully!');
  } else {
    log('fail','Submission may have failed — check Supabase');
  }

  // ── VERIFY IN SUPABASE ─────────────────────────────────────────────────
  if(testPid) {
    log('info','Verifying submission in Supabase for pid: '+testPid);
    setStatus('Checking Supabase...');

    try {
      var resp = await fetch(SUPABASE_URL+'/rest/v1/responses?participant_id=eq.'+testPid+'&select=participant_id,rubric_id,item_id&limit=5', {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer '+SUPABASE_KEY
        }
      });
      var rows = await resp.json();
      if(rows && rows.length > 0) {
        log('pass','Supabase: '+rows.length+'+ rows found for '+testPid);
        log('pass','Sample row: rubric='+rows[0].rubric_id+', item='+rows[0].item_id);
      } else if(rows && rows.length === 0) {
        log('fail','Supabase: 0 rows found for '+testPid+' — submission may have failed');
      } else {
        log('fail','Supabase error: '+JSON.stringify(rows).slice(0,100));
      }
    } catch(e) {
      log('fail','Supabase check failed: '+e.message);
    }
  }

  var finalStatus = fail===0 ? 'All passed!' : fail+' failures';
  setStatus(finalStatus);
  log('info','── Test complete: '+pass+' passed, '+fail+' failed ──');
}
</script>
